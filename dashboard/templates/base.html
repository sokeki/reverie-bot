<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverie {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">

    <!-- Open Graph - Discord embed preview -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Reverie">
    <meta property="og:title" content="🌙 Reverie - {{ guild_name }}">
    <meta property="og:description"
        content="the space between sleep and waking - dream points, ranks & the Hall of Dreamers">
    <meta property="og:image" content="/static/og-image.png">
    <meta name="theme-color" content="#9b8ec4">
</head>

<body>

    <div class="grain"></div>

    <nav>
        <a href="/" class="nav-brand">🌙 Reverie</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>
        <div class="nav-links" id="nav-links">
            <a href="/" {% if request.url.path=="/" %}class="active" {% endif %}>Overview</a>
            <a href="/leaderboard" {% if request.url.path=="/leaderboard" %}class="active" {% endif %}>Leaderboard</a>
            <a href="/shop" {% if request.url.path=="/shop" %}class="active" {% endif %}>Shop</a>
            <a href="/commands" {% if request.url.path=="/commands" %}class="active" {% endif %}>Commands</a>
            {% if user.is_admin %}
            <a href="/questions" {% if request.url.path=="/questions" %}class="active" {% endif %}>Questions</a>
            <a href="/settings" {% if request.url.path=="/settings" %}class="active" {% endif %}>Settings</a>
            {% endif %}
        </div>
        <div class="nav-user">
            {% if user.avatar %}
            <img src="/avatar-proxy?url=https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png"
                class="avatar" alt="avatar">
            {% else %}
            <div class="avatar-placeholder">{{ user.username[0] }}</div>
            {% endif %}
            <span class="username">{{ user.username }}</span>
            {% if user.is_admin %}<span class="badge">admin</span>{% endif %}
            <a href="/logout" class="logout">↩</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        document.getElementById('nav-toggle').addEventListener('click', function () {
            document.getElementById('nav-links').classList.toggle('open');
        });
        document.querySelectorAll('.nav-links a').forEach(function (a) {
            a.addEventListener('click', function () {
                document.getElementById('nav-links').classList.remove('open');
            });
        });
    </script>
</body>

</html>
